baseURL = '/'
languageCode = 'en'
title = 'My New Hugo Project'
cleanDestinationDir = true

[[menus.main]]
  name   = "Articles"
  url    = "/articles/"
  weight = 10

[[menus.main]]
  name   = "News"
  url    = "/news/"
  weight = 30

[[menus.main]]
  name   = "Events"
  url    = "/events/"
  weight = 40

[[menus.main]]
  name   = "Membership"
  url    = "/membership/"
  weight = 45
  [menus.main.params]
    class = "nav-membership"

[[menus.main]]
  name   = "About"
  url    = "/about/"
  weight = 50

[taxonomies]
  tag      = "tags"
  category = "categories"
  state    = "states"

[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "state-repos/state-karnataka/content/articles"
    target = "content/articles"
  [[module.mounts]]
    source = "state-repos/state-karnataka/content/news"
    target = "content/news"
  [[module.mounts]]
    source = "state-repos/state-karnataka/content/events"
    target = "content/events"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup.goldmark.renderer]
  unsafe = true

[params]
  description = "A production-ready Hugo site built with best practices."
  [params.social]
    # twitter = ""  # Set your Twitter/X handle here when ready
    github  = "anand-raj"

[related]
  threshold    = 60
  includeNewer = true
  [[related.indices]]
    name   = "tags"
    weight = 80
  [[related.indices]]
    name   = "categories"
    weight = 60
  [[related.indices]]
    name   = "date"
    weight = 10

